<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - MulticamObserver</title>
    <link rel="stylesheet" href="/static/css/styles.css">
    <link rel="manifest" href="/static/manifest.json">
    <link rel="shortcut icon" href="https://img.icons8.com/isometric-line/512/cctv-camera.png" type="image/png">
</head>
<body>
    <header>
        <div class="header-container">
            <a href="/login" class="logo">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path>
                    <circle cx="12" cy="13" r="4"></circle>
                </svg>
                <span>MulticamObserver</span>
            </a>
        </div>
    </header>

    <main>
        <div class="auth-wrapper">
            <div class="card auth-card">
                <div class="auth-header">
                    <h1>Welcome Back</h1>
                    <p>Access the privacy-first signaling hub</p>
                </div>

                {{if .Error}}
                <div class="alert">
                    {{.Error}}
                </div>
                {{end}}

                <form action="/login" method="POST">
                    <div class="form-group">
                        <label class="form-label" for="role">Access Role</label>
                        <select class="form-select" id="role" name="role" required onchange="toggleLabels()">
                            <option value="admin">Administrator (Viewer)</option>
                            <option value="broadcaster">Broadcaster (Camera Node)</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label class="form-label" id="usernameLabel" for="username">Username or Email</label>
                        <input class="form-input" type="text" id="username" name="username" placeholder="e.g. admin@multicamobserver.com or cam-workspace" required autocomplete="username">
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="password">Security Password</label>
                        <input class="form-input" type="password" id="password" name="password" placeholder="••••••••" required autocomplete="current-password">
                    </div>

                    <button class="btn btn-primary" type="submit" style="width: 100%; justify-content: center; margin-top: 1.5rem; padding: 0.8rem;">
                        Authorize Session
                    </button>
                </form>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 MulticamObserver &bull; Decentralized Personal Security Ecosystem</p>
    </footer>

    <script src="/static/js/app.js"></script>
    <script>
        // Kept for structure consistency but simplified to maintain single universal username/email label
        function toggleLabels() {
            const input = document.getElementById('username');
            input.type = 'text';
        }
        toggleLabels();
    </script>
</body>
</html>
